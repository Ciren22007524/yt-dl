<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/index.css') }}">
</head>
<body class="bg-light">
<button class="btn btn-outline-secondary position-fixed top-0 start-0 m-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
    📂 檔案管理
</button>

<div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">音樂庫管理</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div class="mb-3">
            <label class="form-label fw-bold">📂 本地音樂庫路徑</label>
            <div class="input-group input-group-sm">
                <input type="text" id="library-path-input" class="form-control" placeholder="例如: D:/Music" value="{{ current_path }}">
                <button class="btn btn-outline-primary" id="save-path-btn">儲存</button>
            </div>
            <div id="path-status" class="form-text text-success d-none">✅ 路徑已更新</div>
        </div>
        <div class="d-grid gap-2">
            <button id="sync-btn" class="btn btn-primary">
                🔄 同步本地資料夾 (建立索引)
            </button>
            <hr>
            <h6>資料庫狀態</h6>
            <p id="db-status" class="text-muted small">尚未掃描資料夾</p>
            <ul id="file-list" class="list-group list-group-flush small" style="max-height: 400px; overflow-y: auto;">
            </ul>
        </div>
    </div>
</div>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <img id="video-preview" src="" class="card-img-top d-none" alt="影片封面">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">🎬 YT 下載器</h2>
                    <form id="download-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">YouTube 影片網址</label>
                            <input type="url" id="url-input" name="url" class="form-control" placeholder="貼上網址..." required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">檔案格式</label>
                                <select id="format-select" name="format_type" class="form-select">
                                    <option value="mp4">MP4 (影片)</option>
                                    <option value="mp3">MP3 (音訊)</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3" id="quality-area">
                                <label class="form-label fw-bold">品質設定</label>
                                <select id="quality-select" name="quality" class="form-select">
                                    <option value="best">最佳品質</option>
                                    <option value="2160">2160p (4K)</option>
                                    <option value="1440">1440p (2K)</option>
                                    <option value="1080">1080p</option>
                                    <option value="720">720p</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 btn-lg">🚀 開始下載</button>
                    </form>
                </div>
                <div id="status-footer" class="card-footer bg-white text-center py-3 d-none">
                    <div id="progress-container" class="mt-2" style="display:none;">
                        <div class="progress" style="height: 20px; border-radius: 10px;">
                            <div id="progress-bar"
                                 class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                                 role="progressbar"
                                 style="width: 0%; transition: width 0.3s;">
                            </div>
                        </div>
                        <p id="status-text" class="mt-2 mb-0 fw-bold text-primary">準備下載...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', path='/js/index.js') }}"></script>
<script src="{{ url_for('static', path='/js/websocket.js') }}"></script>
</body>
</html>
