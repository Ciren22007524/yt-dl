<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='/css/index.css') }}">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <img id="video-preview" src="" class="card-img-top d-none" alt="影片封面">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">🎬 YT 下載器</h2>
                    <form id="download-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">YouTube 影片網址</label>
                            <input type="url" id="url-input" name="url" class="form-control" placeholder="貼上網址..." required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-bold">檔案格式</label>
                                <select id="format-select" name="format_type" class="form-select">
                                    <option value="mp4">MP4 (影片)</option>
                                    <option value="mp3">MP3 (音訊)</option>
                                </select>
                            </div>
                            <div class="col-6 mb-3" id="quality-area">
                                <label class="form-label fw-bold">品質設定</label>
                                <select id="quality-select" name="quality" class="form-select">
                                    <option value="best">最佳品質</option>
                                    <option value="1080">1080p</option>
                                    <option value="720">720p</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 btn-lg">🚀 開始下載</button>
                    </form>
                </div>
                <div id="status-footer" class="card-footer bg-white text-center py-3 d-none">
                    <div id="progress-container" class="mt-2" style="display:none;">
                        <div class="progress" style="height: 20px; border-radius: 10px;">
                            <div id="progress-bar"
                                 class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                                 role="progressbar"
                                 style="width: 0%; transition: width 0.3s;">
                            </div>
                        </div>
                        <p id="status-text" class="mt-2 mb-0 fw-bold text-primary">準備下載...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='/js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', path='/js/index.js') }}"></script>
<script src="{{ url_for('static', path='/js/websocket.js') }}"></script>
</body>
</html>
